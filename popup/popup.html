<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span {
      font-size: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #4a90d9;
      color: white;
    }
    .btn-primary:hover {
      background: #3a7bc8;
    }
    .btn-primary:disabled {
      background: #a0c4e8;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .btn-secondary:disabled {
      background: #f0f0f0;
      color: #999;
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      min-height: 16px;
    }
    #status.error {
      color: #d93025;
    }
  </style>
</head>
<body>
  <h1><span>読</span> 読める</h1>
  <button id="bulkBtn" class="btn btn-primary" data-i18n="readerMode">Reader Mode</button>
  <button id="annotateAllBtn" class="btn btn-secondary" data-i18n="bulkAnnotate">Annotate All</button>
  <button id="translateAllBtn" class="btn btn-secondary" data-i18n="bulkTranslate">Translate All</button>
  <button id="vocabBtn" class="btn btn-secondary" data-i18n="vocabulary">生词本</button>
  <button id="optionsBtn" class="btn btn-secondary" data-i18n="options">Options</button>
  <div id="status"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
