<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="pageTitle">生词本 - 読める</title>
  <link rel="stylesheet" href="vocabulary.css">
</head>
<body>
  <div class="vocab-toolbar">
    <div class="toolbar-left">
      <span class="toolbar-logo">読 読める</span>
      <span class="toolbar-title" data-i18n="vocabTitle">生词本</span>
    </div>
    <div class="toolbar-center">
      <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索单词、读音、翻译...">
      <span id="countText" class="count-text"></span>
    </div>
    <div class="toolbar-right">
      <button id="exportBtn" class="toolbar-btn" hidden data-i18n="exportJson">导出 JSON</button>
      <button id="clearAllBtn" class="toolbar-btn danger" hidden data-i18n="deleteAll">全部删除</button>
    </div>
  </div>
  <div class="vocab-layout">
    <aside class="vocab-sidebar">
      <nav id="posFilter" class="pos-filter"></nav>
    </aside>
    <div class="vocab-content">
      <div id="vocabList" class="vocab-list"></div>
      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-icon">読</div>
        <p data-i18n="noVocab">还没有生词</p>
        <p class="empty-hint" data-i18n="noVocabHint">在注音后的文本中点击单词即可添加到生词本</p>
      </div>
    </div>
  </div>
  <!-- FAB -->
  <button id="addWordFab" class="fab" title="添加单词">
    <img src="../icons/plus.svg" alt="+" class="fab-icon">
  </button>

  <!-- Add word modal -->
  <div id="addWordModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="addWord">添加</span>
        <button id="modalCloseBtn" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="addWordInput" class="modal-input" data-i18n-placeholder="addWordPlaceholder" placeholder="输入单词..." autofocus>
      </div>
      <div class="modal-footer">
        <button id="addWordBtn" class="toolbar-btn primary" data-i18n="addWord">添加</button>
      </div>
    </div>
  </div>

  <script type="module" src="vocabulary.js"></script>
</body>
</html>
