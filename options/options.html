<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kana Master - Options</title>
  <style>
    body {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      box-sizing: border-box;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .toggle-group {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .toggle-option {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      margin-top: 0;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 24px;
    }
    .btn-primary {
      background: #4a90d9;
      color: white;
    }
    .btn-primary:hover {
      background: #3a7bc8;
    }
    #status {
      display: inline-block;
      margin-left: 12px;
      font-size: 14px;
      color: #0d7e3f;
    }
  </style>
</head>
<body>
  <h1>Kana Master Options</h1>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="sk-...">

  <label for="apiBaseUrl">API Base URL</label>
  <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
  <div class="hint">Change this for OpenAI-compatible providers</div>

  <label for="model">Model</label>
  <div style="display:flex;gap:8px;align-items:center;">
    <select id="model" style="flex:1;"><option value="">Loading...</option></select>
    <button type="button" id="refreshModels" class="btn" style="margin:0;padding:6px 12px;font-size:12px;background:#eae7e2;color:#555;border-radius:4px;">Refresh</button>
  </div>

  <label for="targetLang">Target Language</label>
  <select id="targetLang">
    <option value="zh-CN">简体中文</option>
    <option value="zh-TW">繁体中文</option>
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="ar">العربية</option>
    <option value="ru">Русский</option>
    <option value="ne">नेपाली</option>
    <option value="vi">Tiếng Việt</option>
    <option value="my">မြန်မာ</option>
    <option value="fil">Filipino</option>
    <option value="pt">Português</option>
    <option value="it">Italiano</option>
    <option value="id">Bahasa Indonesia</option>
    <option value="ms">Bahasa Melayu</option>
  </select>

  <label for="ttsVoice">TTS Voice</label>
  <select id="ttsVoice">
    <option value="alloy">Alloy</option>
    <option value="ash">Ash</option>
    <option value="ballad">Ballad</option>
    <option value="coral">Coral</option>
    <option value="echo">Echo</option>
    <option value="fable">Fable</option>
    <option value="nova">Nova</option>
    <option value="onyx">Onyx</option>
    <option value="sage">Sage</option>
    <option value="shimmer">Shimmer</option>
  </select>
  <div class="hint">Preview voices at <a href="https://platform.openai.com/docs/guides/text-to-speech" target="_blank">OpenAI TTS docs</a></div>

  <label for="useLocalTranslation">Translation Engine</label>
  <div class="toggle-group">
    <label class="toggle-option">
      <input type="radio" name="translationEngine" value="cloud" id="engineCloud" checked>
      <span>Cloud (API)</span>
    </label>
    <label class="toggle-option">
      <input type="radio" name="translationEngine" value="local" id="engineLocal">
      <span>Local (Chrome Built-in AI)</span>
    </label>
  </div>
  <div class="hint" id="localStatus"></div>

  <label for="furiganaPrompt">Furigana System Prompt</label>
  <textarea id="furiganaPrompt" rows="5"></textarea>

  <label for="translationPrompt">Translation System Prompt</label>
  <textarea id="translationPrompt" rows="3"></textarea>

  <div>
    <button id="saveBtn" class="btn btn-primary">Save</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
