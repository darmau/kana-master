<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kana Master - Options</title>
  <style>
    body {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      box-sizing: border-box;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .toggle-group {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .toggle-option {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      margin-top: 0;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 24px;
    }
    .btn-primary {
      background: #4a90d9;
      color: white;
    }
    .btn-primary:hover {
      background: #3a7bc8;
    }
    #status {
      display: inline-block;
      margin-left: 12px;
      font-size: 14px;
      color: #0d7e3f;
    }
  </style>
</head>
<body>
  <h1>Kana Master Options</h1>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="sk-...">

  <label for="apiBaseUrl">API Base URL</label>
  <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
  <div class="hint">Change this for OpenAI-compatible providers</div>

  <label for="model">Model</label>
  <input type="text" id="model" placeholder="gpt-4o-mini">

  <label for="useLocalTranslation">Translation Engine</label>
  <div class="toggle-group">
    <label class="toggle-option">
      <input type="radio" name="translationEngine" value="cloud" id="engineCloud" checked>
      <span>Cloud (API)</span>
    </label>
    <label class="toggle-option">
      <input type="radio" name="translationEngine" value="local" id="engineLocal">
      <span>Local (Chrome Built-in AI)</span>
    </label>
  </div>
  <div class="hint" id="localStatus"></div>

  <label for="furiganaPrompt">Furigana System Prompt</label>
  <textarea id="furiganaPrompt" rows="5"></textarea>

  <label for="translationPrompt">Translation System Prompt</label>
  <textarea id="translationPrompt" rows="3"></textarea>

  <div>
    <button id="saveBtn" class="btn btn-primary">Save</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
