<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>読める Reader</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <div class="reader-toolbar">
    <div class="toolbar-left">
      <span class="toolbar-logo">読 読める</span>
    </div>
    <div class="toolbar-center">
      <span id="hint" class="toolbar-hint" data-i18n="selectHint">Click to select, Shift+click for range, then delete</span>
      <button id="deleteSelBtn" class="toolbar-btn danger" hidden>Delete (0)</button>
      <button id="annotateBtn" class="toolbar-btn primary" data-i18n="annotate"><img src="../icons/furigana.svg" class="toolbar-icon"> 注音</button>
      <button id="translateBtn" class="toolbar-btn primary" data-i18n="translate"><img src="../icons/translate.svg" class="toolbar-icon"> 翻訳</button>
      <button id="ttsBtn" class="toolbar-btn tts" data-i18n="readAloud"><img src="../icons/speak.svg" class="toolbar-icon"> 朗読</button>
      <button id="ttsStopBtn" class="toolbar-btn danger" hidden data-i18n="stop">停止</button>
      <span id="progress" class="progress-text"></span>
    </div>
    <div class="toolbar-right">
      <a id="vocabLink" href="../vocabulary/vocabulary.html" target="_blank" class="toolbar-btn secondary" data-i18n="vocabulary">生词本</a>
      <a id="originalLink" href="#" target="_blank" class="toolbar-btn secondary" data-i18n="original">原文</a>
    </div>
  </div>
  <article id="reader-content" class="reader-content">
    <h1 id="reader-title" class="reader-title"></h1>
    <div id="reader-body"></div>
  </article>
  <script type="module" src="reader.js"></script>
</body>
</html>
