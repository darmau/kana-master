<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>読める Reader</title>
    <link rel="stylesheet" href="reader.css" />
  </head>
  <body>
    <div class="reader-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-logo">読める</span>
      </div>
      <div class="toolbar-center">
        <span id="hint" class="toolbar-hint" data-i18n="selectHint"
          >Click to select, Shift+click for range, then delete</span
        >
        <button id="deleteSelBtn" class="toolbar-btn danger" hidden>
          Delete (0)
        </button>
        <button
          id="annotateBtn"
          class="toolbar-btn primary"
          data-i18n="annotate"
        >
          <img src="../icons/furigana.svg" class="toolbar-icon" /> 注音
        </button>
        <button
          id="translateBtn"
          class="toolbar-btn primary"
          data-i18n="translate"
        >
          <img src="../icons/translate.svg" class="toolbar-icon" /> 翻訳
        </button>
        <button id="quizBtn" class="toolbar-btn quiz" data-i18n="quiz">
          Quiz
        </button>
        <span id="progress" class="progress-text"></span>
      </div>
      <div class="toolbar-right">
        <a
          id="historyLink"
          href="../history/history.html"
          target="_blank"
          class="toolbar-btn secondary"
          data-i18n="history"
          >History</a
        >
        <a
          id="vocabLink"
          href="../vocabulary/vocabulary.html"
          target="_blank"
          class="toolbar-btn secondary"
          data-i18n="vocabulary"
          >生词本</a
        >
        <a
          id="originalLink"
          href="#"
          target="_blank"
          class="toolbar-btn secondary"
          data-i18n="original"
          >原文</a
        >
      </div>
    </div>
    <div class="reader-layout" id="readerLayout">
      <article id="reader-content" class="reader-content">
        <h1 id="reader-title" class="reader-title"></h1>
        <div id="reader-body"></div>
      </article>
      <aside id="quiz-panel" class="quiz-panel" hidden>
        <div class="quiz-panel-header">
          <h2 data-i18n="quizTitle">Reading Comprehension</h2>
          <button id="quizCloseBtn" class="quiz-close">&times;</button>
        </div>
        <div id="quiz-body" class="quiz-body"></div>
      </aside>
    </div>
    <div id="ttsBar" class="tts-bar">
      <div id="ttsProgressTrack" class="tts-progress-track">
        <div id="ttsProgressFill" class="tts-progress-fill"></div>
        <div id="ttsProgressThumb" class="tts-progress-thumb"></div>
      </div>
      <div class="tts-controls">
        <div class="tts-controls-left">
          <span id="ttsCurrentTime" class="tts-time">0:00</span>
          <span class="tts-time-sep">/</span>
          <span id="ttsTotalTime" class="tts-time">--:--</span>
        </div>
        <div class="tts-controls-center">
          <button id="ttsPrevBtn" class="tts-ctrl-btn" title="前の段落">⏮</button>
          <button id="ttsPlayBtn" class="tts-ctrl-btn tts-play-btn">▶</button>
          <span id="ttsLoadingText" class="tts-loading-text" hidden></span>
          <button id="ttsNextBtn" class="tts-ctrl-btn" title="次の段落">⏭</button>
        </div>
        <div class="tts-controls-right">
          <select id="ttsSpeedSelect" class="tts-speed-select">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
          <button id="ttsCloseBtn" class="tts-ctrl-btn tts-close-btn" title="停止">✕</button>
        </div>
      </div>
    </div>
    <script type="module" src="reader.js"></script>
  </body>
</html>
